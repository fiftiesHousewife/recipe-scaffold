name: CI

# Verifies the template can be scaffolded and that the result passes its own
# `./gradlew check smokeTest` gates. Three jobs run in parallel:
#
#   bash-scaffold  — runs tests/ci-smoke.sh end-to-end (the v0 fallback path).
#   jbang-scaffold — runs the JBang Init subcommand with --verify (the
#                    supported scaffold flow). Mirrors the bash flow but
#                    exercises picocli arg parsing and the residual-check
#                    pattern.
#   harness        — runs the in-repo TestKit harness (./gradlew test) which
#                    drives Init/AddRecipe as Java methods into a @TempDir
#                    and runs the scaffolded project's `check` via
#                    GradleRunner with -g <tmp> -Dmaven.repo.local=<tmp>.
#                    Sandbox-friendly; designed to work locally too.
#
# All three jobs install JDK 21 alongside JDK 25 because the scaffolded
# project's smokeTest forks a child Gradle 8.14.3 that cannot host JDK 25.
# The harness job also installs JDK 17 for the recipescaffold root build.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bash-scaffold:
    name: Scaffold via tests/ci-smoke.sh
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25
      - uses: gradle/actions/setup-gradle@v4
      - uses: jbangdev/setup-jbang@main
      - name: tests/ci-smoke.sh
        run: ./tests/ci-smoke.sh /tmp/recipe-template-ci-smoke
      - name: jbang add-recipe against bash-scaffolded project
        working-directory: /tmp/recipe-template-ci-smoke
        run: |
          jbang ${GITHUB_WORKSPACE}/jbang/RecipeScaffold.java add-recipe \
            --name SmokeRecipe \
            --display-name "Smoke recipe (CI)" \
            --description "Generated by ci-smoke.sh + add-recipe to verify the java snippet flow."
          jbang ${GITHUB_WORKSPACE}/jbang/RecipeScaffold.java add-recipe \
            --name SmokeScanRecipe --type scanning \
            --display-name "Smoke scanning recipe (CI)" \
            --description "Generated by ci-smoke.sh + add-recipe to verify the scanning snippet flow."
          jbang ${GITHUB_WORKSPACE}/jbang/RecipeScaffold.java add-recipe \
            --name SmokeYamlRecipe --type yaml \
            --display-name "Smoke yaml recipe (CI)" \
            --description "Generated by ci-smoke.sh + add-recipe to verify the yaml composition flow."
          jbang ${GITHUB_WORKSPACE}/jbang/RecipeScaffold.java add-recipe \
            --name SmokeRefasterRecipe --type refaster \
            --display-name "Smoke refaster recipe (CI)" \
            --description "Generated by ci-smoke.sh + add-recipe to verify the refaster snippet flow."
          jbang ${GITHUB_WORKSPACE}/jbang/RecipeScaffold.java add-recipe \
            --name SmokeMethodTestRecipe --type java --test-style method \
            --display-name "Smoke method-test recipe (CI)" \
            --description "Generated by ci-smoke.sh + add-recipe to verify --test-style method."
          ./gradlew check

  jbang-scaffold:
    name: Scaffold via jbang init --verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25
      - uses: gradle/actions/setup-gradle@v4
      - uses: jbangdev/setup-jbang@main
      - name: jbang init --verify
        run: |
          jbang jbang/RecipeScaffold.java init \
            --group=io.github.acme \
            --artifact=acme-rewrite-recipes \
            --package=io.github.acme \
            --initial-version=0.1 \
            --recipe-name="Acme Recipes" \
            --recipe-description="OpenRewrite recipes scaffolded from recipescaffold" \
            --github-org=acme \
            --github-repo=acme-rewrite-recipes \
            --author-id=acmebot \
            --author-name="Acme Bot" \
            --author-email=bot@acme.example \
            -d /tmp/recipe-template-jbang-ci \
            --force \
            --verify
      - name: jbang add-recipe against jbang-scaffolded project
        working-directory: /tmp/recipe-template-jbang-ci
        run: |
          jbang ${GITHUB_WORKSPACE}/jbang/RecipeScaffold.java add-recipe \
            --name SmokeRecipe \
            --display-name "Smoke recipe (CI)" \
            --description "Generated by jbang init + add-recipe to verify the java snippet flow."
          jbang ${GITHUB_WORKSPACE}/jbang/RecipeScaffold.java add-recipe \
            --name SmokeScanRecipe --type scanning \
            --display-name "Smoke scanning recipe (CI)" \
            --description "Generated by jbang init + add-recipe to verify the scanning snippet flow."
          jbang ${GITHUB_WORKSPACE}/jbang/RecipeScaffold.java add-recipe \
            --name SmokeYamlRecipe --type yaml \
            --display-name "Smoke yaml recipe (CI)" \
            --description "Generated by jbang init + add-recipe to verify the yaml composition flow."
          jbang ${GITHUB_WORKSPACE}/jbang/RecipeScaffold.java add-recipe \
            --name SmokeRefasterRecipe --type refaster \
            --display-name "Smoke refaster recipe (CI)" \
            --description "Generated by jbang init + add-recipe to verify the refaster snippet flow."
          jbang ${GITHUB_WORKSPACE}/jbang/RecipeScaffold.java add-recipe \
            --name SmokeMethodTestRecipe --type java --test-style method \
            --display-name "Smoke method-test recipe (CI)" \
            --description "Generated by jbang init + add-recipe to verify --test-style method."
          ./gradlew check

  harness:
    name: In-repo TestKit harness (./gradlew test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
            25
      - uses: gradle/actions/setup-gradle@v4
      - name: ./gradlew test
        run: ./gradlew test --stacktrace

  actionlint:
    name: actionlint (workflows + scaffolded workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: jbangdev/setup-jbang@main
      - name: Install actionlint
        # Pinned binary; avoiding `bash <(curl ...)` of an unpinned URL.
        run: |
          ACTIONLINT_VERSION=1.7.7
          curl -fsSL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          chmod +x /tmp/actionlint
          /tmp/actionlint -version
      - name: Lint recipescaffold workflows
        run: /tmp/actionlint .github/workflows/*.yml
      - name: Scaffold a project so we can lint the shipped workflows post-substitution
        # No --verify: skip the gradle build, we only need the substituted
        # workflow files. The bash- and jbang-scaffold jobs already exercise
        # the full gate chain.
        run: |
          jbang jbang/RecipeScaffold.java init \
            --group=io.github.acme \
            --artifact=acme-rewrite-recipes \
            --package=io.github.acme \
            --recipe-name="Acme Recipes" \
            --recipe-description="OpenRewrite recipes scaffolded from recipescaffold" \
            --github-org=acme \
            --github-repo=acme-rewrite-recipes \
            --author-id=acmebot \
            --author-name="Acme Bot" \
            --author-email=bot@acme.example \
            -d /tmp/recipe-template-actionlint \
            --force
      - name: Lint scaffolded project workflows
        run: /tmp/actionlint /tmp/recipe-template-actionlint/.github/workflows/*.yml
