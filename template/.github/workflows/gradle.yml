name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    # Install JDK 25 for the main project + JDK 21 as the launcher for the
    # integrationTest + smokeTest tasks (Gradle 8.14.3 daemons embedded by
    # withToolingApi and the smoke wrapper can't host JDK 25).
    - name: Set up JDKs 21 and 25
      uses: actions/setup-java@v4
      with:
        java-version: |
          21
          25
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build with Gradle Wrapper
      # smokeTest scaffolds /tmp Gradle projects per recipe variant, runs the
      # recipe end-to-end via a nested Gradle process, and confirms the rewritten
      # Java compiles. It is the structural pre-publish gate locally; running it
      # in CI ensures a green main means the same thing the publish task gates on.
      run: ./gradlew check smokeTest
