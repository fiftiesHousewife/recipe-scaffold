name: Release

# Tag-triggered publish to Maven Central via vanniktech/gradle-maven-publish-plugin.
# `publishAndReleaseToMavenCentral` `dependsOn("smokeTest")` so the smoke matrix
# runs before anything reaches Central — the gate is structural.
#
# Required repository secrets (Settings -> Secrets -> Actions):
#   MAVEN_CENTRAL_USERNAME       Sonatype Central portal user token
#   MAVEN_CENTRAL_PASSWORD       Sonatype Central portal token password
#   SIGNING_IN_MEMORY_KEY        ASCII-armored GPG private key
#   SIGNING_IN_MEMORY_KEY_ID     Last 8 hex chars of the key id (optional if only one key)
#   SIGNING_IN_MEMORY_KEY_PASSWORD   Passphrase for the key

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            {{javaTargetTests}}
      - uses: gradle/actions/setup-gradle@v4
      - name: publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
